name: Public Tester Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: windows-latest

    env:
      GENCHAT_API_BASE_URL: ${{ vars.GENCHAT_API_BASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release environment
        shell: pwsh
        run: |
          if (-not $env:GENCHAT_API_BASE_URL) {
            throw "Missing repository variable GENCHAT_API_BASE_URL."
          }

      - name: Write extension environment file
        shell: pwsh
        run: |
          Set-Content -Path "apps/extension/.env" -Value "VITE_GENCHAT_API_BASE=$env:GENCHAT_API_BASE_URL"

      - name: Build tester release
        run: npm run release:tester

      - name: Upload tester artifact
        uses: actions/upload-artifact@v4
        with:
          name: genchat-tester-extension
          path: |
            release/tester-extension
            release/tester-extension.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          Desktop install:
          1. Download `tester-extension.zip` from this release.
          2. Extract the zip to a normal folder.
          3. Open chrome://extensions.
          4. Turn on Developer mode.
          5. Click Load unpacked.
          6. Select the extracted `tester-extension` folder.

          This release is wired to the hosted GenChat API configured in the repository variable `GENCHAT_API_BASE_URL`.
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag "release/tester-extension.zip" --clobber
          } else {
            gh release create $tag "release/tester-extension.zip" --title "GenChat $tag" --notes $notes
          }
